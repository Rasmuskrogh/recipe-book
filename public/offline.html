<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c8622a" />
    <title>Offline</title>
    <style>
      :root {
        --bg: #faf8f5;
        --fg: #171717;
        --accent: #c8622a;
      }
      body {
        margin: 0;
        padding: 2rem 1rem;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, sans-serif;
      }
      .wrap {
        max-width: 46rem;
        margin: 0 auto;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.8);
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        color: var(--accent);
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        opacity: 0.92;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.95rem;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Du är offline</h1>
      <p>Det går inte att nå servern just nu. När du är tillbaka online laddas allt normalt.</p>
      <div class="hint">Tips: Försök igen eller testa en annan uppkoppling.</div>
    </div>
  </body>
</html>
